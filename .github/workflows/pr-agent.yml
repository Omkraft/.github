name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pr-agent:
    name: PR Agent Review
    uses: ./.github/workflows/pr-agent-review.yml
    secrets:
      OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
